<!--
 html은 태그라는 괄호 <>를 사용해서 콘텐츠의 역활을 정의. 대부분은 시작 태그와 종료 태그가 한 쌍으로 움직임.
 구조 : <태그명>내용물</태그명>
 <h1> ~ <h6> : 보통 제목을 정할 때 사용. 숫자가 작을수록 글자가 크고 중요
 <p> : 일반적인 텍스트 줄바꿈을 포함한 문단
 <a> : 링크 : 다른페이지로 이동할 때 사용합니다.(a태그 뿐만 아니라 각각의 태그에서도 고유한 속성들이 들어있음)
 <img> : 이미지 : 사진을 넣을 때 사용, src : 이미지의 경로를 설정
 <ul>, <li> 리스트 : 목록을 나열할 때 사용
 -->

<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>코리아 it 아카데미</title>
</head>
<body>
<h1>중요한 내용1</h1>
<h2>중요한 내용2</h2>
<h3>중요한 내용3</h3>
<p>단락</p>
<p>안녕하세요</p>
<a href="https://www.naver.com/" target="_blank">네이버로 가는 태그입니다.</a>
<img src="../2026-01-27/input/pokemon.png" alt="./">
<ul>
    <li>안녕하세요</li>
    <li>반갑습니다.</li>
</ul>
</body>
</html>
