<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코리아IT아카데미 - 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #0066FF;
            --primary-hover: #0052CC;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --input-border: #e2e8f0;
            --input-focus: #0066FF;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(0, 102, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 102, 255, 0.05) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 48px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-area h1 {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-color);
            letter-spacing: -1px;
        }

        .logo-area p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid var(--input-border);
            outline: none;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: #f1f5f9;
        }

        .input-wrapper input:focus {
            border-color: var(--primary-color);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.1);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--primary-color);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 102, 255, 0.2);
        }

        .login-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 102, 255, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .signup-prompt {
            text-align: center;
            margin-top: 32px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .signup-prompt a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
        }

        .signup-prompt a:hover {
            text-decoration: underline;
        }

        /* Floating background shapes */
        .shape {
            position: absolute;
            z-index: -1;
            filter: blur(60px);
            border-radius: 50%;
            opacity: 0.4;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: #0066FF;
            top: -100px;
            right: -100px;
            animation: float 15s infinite alternate ease-in-out;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: #60A5FA;
            bottom: -50px;
            left: -50px;
            animation: float 18s infinite alternate-reverse ease-in-out;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(50px, 40px) scale(1.1);
            }
        }
    </style>
</head>

<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <h1>KOREA IT</h1>
                <p>미래를 설계하는 최고의 IT 교육 파트너</p>
            </div>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="username">아이디 (이메일)</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="example@korea-it.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox"> 로그인 유지
                    </label>
                    <a href="#" class="forgot-password">비밀번호 찾기</a>
                </div>

                <button type="submit" class="login-btn">로그인</button>
            </form>

            <div class="signup-prompt">
                아직 계정이 없으신가요? <a href="#">회원가입</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const btn = event.target.querySelector('.login-btn');
            const originalText = btn.textContent;

            // 시각적인 피드백을 위해 버튼 상태 변경
            btn.textContent = '로그인 중...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            setTimeout(() => {
                alert('코리아IT 아카데미에 오신 것을 환영합니다!');
                btn.textContent = originalText;
                btn.style.opacity = '1';
                btn.disabled = false;
            }, 1000);

            return false;
        }

        // 입력창 포커스 효과 강화
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.style.transform = 'translateX(5px)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.style.transform = 'translateX(0)';
            });
        });
    </script>
</body>

</html>
