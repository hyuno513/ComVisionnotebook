<!--
 html은 태그라는 괄호 <>를 사용해서 콘텐츠의 역활을 정의. 대부분은 시작 태그와 종료 태그가 한 쌍으로 움직임.
 구조 : <태그명>내용물</태그명>
 <h1> ~ <h6> : 보통 제목을 정할 때 사용. 숫자가 작을수록 글자가 크고 중요
 <p> : 일반적인 텍스트 줄바꿈을 포함한 문단
 <a> : 링크 : 다른페이지로 이동할 때 사용합니다.(a태그 뿐만 아니라 각각의 태그에서도 고유한 속성들이 들어있음)
 <img> : 이미지 : 사진을 넣을 때 사용, src : 이미지의 경로를 설정
 <ul>, <li> 리스트 : 목록을 나열할 때 사용
 -->

<!--
1.
Css : 웹 사이트를 만들때 html이 뼈대라면 css는 뼈대에 입히는 옷 & 메이크업
Css의 기본구조 :
선택자(Selector) : 스타일을 선택할 대상 )) 예 : h1, .className, #idName
속성(Property) : 변경하고 싶은 특징 )) 예 : color, font-size
값(Value) : 설정하고 싶은 수치나 상태 )) 예 : red, 20px

2. CSS 적용방법 3가지
    1. 외부 스타일 시트 : .css 파일을 만들어서 html의 head태그 안에 link로 연결 - 가장 권장되는 방식
    2. 내부 스타일 시트 : html 파일의 <style>태그 안에 직접 작성

3. CSS 파일 적용예시
    1. link태그 속성 : rel="stylesheet" : 연결할 파일이 '스타일시트'라는 관계 필수 속성
    2. href="파일경로" : CSS 파일이 있는 위치를 지정한다.
    3. CSS가 css라는 폴더안에 있을 경우 : <link rel="stylesheet" href="css/style.css">

4. 왜 왜부파일로 연결하는가?
    1. 재사용성 : 하나의 CSS 파일을 여러 Html 페이지에서 동시에 불러와 작업이 가능.
-->

<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
        p {
            color: blue;
            font-size: 30px;
        }
    </style>
    <link rel="stylesheet" href="../../2026-01-29/CSS/1.%20Css.css">
    <title>코리아 it 아카데미</title>
</head>
<body>
<h1>중요한 내용1</h1>
<h2>중요한 내용2</h2>

<p>단락</p>
<p>안녕하세요</p>
<a href="https://www.naver.com/" target="_blank" style="font-size: 30px">네이버로 가는 태그입니다.</a>
<img src="../../2026-01-27/input/pokemon.png" alt="./">
<ul>
    <li>안녕하세요</li>
    <li>반갑습니다.</li>
</ul>
